version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "build:"
    target-branch: "main"
    reviewers:
      - "walker84837"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps:"
    target-branch: "main"
    reviewers:
      - "walker84837"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
